
  <svg
    aria-labelledby="titleId descId"
    fill="#fffefe"
    height="175"
    role="img"
    viewBox="0 0 388 175"
    width="388"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">

    <title id="titleId">GitHub Creator Karma</title>
    <desc id="descId">Creator karma card. Rank Localhost Lurker. Why are you even here? Get coding!. Progress 0.4 percent. Score 2.</desc>

    <style>
      .bar { stroke:#4c71f2;stroke-width:8;fill:none;stroke-linecap:round;stroke-dasharray:263.894;stroke-dashoffset:263.894;transform:rotate(-90deg);transform-origin:304px 105px;animation:fillRing 1.2s ease-out forwards; }
      .h1 { fill:#434d58;font:800 22px Ubuntu,Sans-Serif;letter-spacing:.04em; }
      .h3 { fill:#2f80ed;font:600 10px Ubuntu,Sans-Serif; }
      .h4 { fill:#434d58;font:400 12px Ubuntu,Sans-Serif; }
      .meta { fill:#434d58;font:400 10px Ubuntu,Sans-Serif;opacity:.8; }
      .rim { stroke:#4c71f2;stroke-width:8;fill:none;opacity:.2; }
      .score { fill:#434d58;font:700 12px Ubuntu,Sans-Serif;text-anchor:middle; }
      .score-flip { cursor:pointer; }
      .score-front, .score-back { transition:opacity .35s ease, transform .35s ease; transform-origin:304px 105px; }
      .score-front { opacity:1; transform:scaleX(1); }
      .score-back { opacity:0; transform:scaleX(0.15); }
      .score-flip:hover .score-front, .score-flip:focus .score-front, .score-flip:focus-within .score-front { opacity:0; transform:scaleX(0.15); }
      .score-flip:hover .score-back, .score-flip:focus .score-back, .score-flip:focus-within .score-back { opacity:1; transform:scaleX(1); }
      .split { stroke:#e4e2e2;stroke-width:1; }

      @keyframes fillRing { to { stroke-dashoffset:262.838 } }
      @media (prefers-reduced-motion: reduce) {.bar{animation:none;stroke-dashoffset:262.838 } }
    </style>

    <rect
      fill="#fffefe"
      height="173"
      rx="8.5"
      stroke="#e4e2e2"
      width="386"
      x="0.5"
      y="0.5"/>

    <text class="h3" x="16" y="30">GitHub Creator Karma</text>

    <text class="meta" x="16" y="52">Rank</text>
    <text class="h1" x="16" y="74">Localhost</text>
    <text class="h1" x="16" y="96">Lurker</text>
    <text class="h4" x="16" y="118">Why are you even here? Get coding!</text>
    <text class="h4" x="16" y="130"></text>

    <line class="split" x1="225" y1="46" x2="225" y2="151" />

    <text class="meta" x="288" y="52">Karma</text>
    <circle class="rim" cx="304" cy="105" r="42"/>
    <circle class="bar" cx="304" cy="105" r="42"/>
    <g class="score-flip" tabindex="0" role="img" aria-label="Score 2 / 500. Hover to view rank logo.">
      <circle cx="304" cy="105" r="22" fill="transparent" />
      <text class="score score-front" x="304" y="109">2 / 500</text>
      
  <image
    class="score-back"
    href="/logos/github-karma-rank-7-logo.png"
    xlink:href="/logos/github-karma-rank-7-logo.png"
    preserveAspectRatio="xMidYMid meet"
    width="58"
    height="58"
    x="275"
    y="76"/>
    </g>

  </svg>