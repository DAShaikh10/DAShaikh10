
  <svg
    aria-labelledby="titleId descId"
    fill="#002046"
    height="175"
    role="img"
    style="cursor:pointer"
    viewBox="0 0 388 175"
    width="388"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">

    <title id="titleId">DAShaikh10's GitHub Contributor Karma</title>
    <desc id="descId">Contributor karma card. Rank New Contributor. You've made your first contribution!. Progress 93.9 percent. Score 1427.</desc>
    

    <style>
      .bar { stroke:#ff0;stroke-width:8;fill:none;stroke-linecap:round;stroke-dasharray:263.894;stroke-dashoffset:263.894;transform:rotate(-90deg);transform-origin:304px 105px;animation:fillRing 1.2s ease-out forwards; }
      .h1 { fill:#fff;font:800 22px Ubuntu,Sans-Serif;letter-spacing:.04em; }
      .h3 { fill:#ff0;font:600 10px Ubuntu,Sans-Serif; }
      .h4 { fill:#fff;font:400 12px Ubuntu,Sans-Serif; }
      .meta { fill:#fff;font:400 10px Ubuntu,Sans-Serif;opacity:.8; }
      .rim { stroke:#ff0;stroke-width:8;fill:none;opacity:.2; }
      .score { fill:#fff;font:700 12px Ubuntu,Sans-Serif;text-anchor:middle; }
      .split { stroke:#e4e2e2;stroke-width:1; }

      @keyframes fillRing { to { stroke-dashoffset:16.098 } }
      @media (prefers-reduced-motion: reduce) {.bar{animation:none;stroke-dashoffset:16.098 } }
    </style>

    <rect
      fill="#002046"
      height="173"
      rx="8.5"
      stroke="#e4e2e2"
      width="386"
      x="0.5"
      y="0.5"/>

    <text class="h3" x="16" y="30">DAShaikh10's GitHub Contributor Karma</text>

    <text class="meta" x="16" y="52">Rank</text>
    <text class="h1" x="16" y="74">New</text>
    <text class="h1" x="16" y="96">Contributor</text>
    <text class="h4" x="16" y="118">You've made your first</text>
    <text class="h4" x="16" y="130">contribution!</text>

    <line class="split" x1="225" y1="46" x2="225" y2="151" />

    <text class="meta" x="288" y="52">Karma</text>
    <circle class="rim" cx="304" cy="105" r="42"/>
    <circle class="bar" cx="304" cy="105" r="42"/>
    <text class="score" x="304" y="109">1.4K / 1.5K</text>
    
  <image
    class=""
    href="https://github-karma.vercel.app/logos/github-karma-logo.png"
    xlink:href="https://github-karma.vercel.app/logos/github-karma-logo.png"
    preserveAspectRatio="xMidYMid meet"
    width="32"
    height="32"
    x="346"
    y="132"/>

  </svg>